<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="./style.css">
        <title>form</title>
         <meta name="viewport" content="width=device-width, initial-scale=1.0">
         <link rel="preconnect" href="https://fonts.googleapis.com">
   <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
   <link href="https://fonts.googleapis.com/css2?family=Fjord+One&display=swap" rel="stylesheet">
    </head>

    <body style="background-color: rgb(32, 32, 64) ;">
        
     <form>
        <fieldset>
            <legend>form to park</legend>
            <table>
            
            <tr>
            <td><label for="fn">First name:</label></td>
            <td><input type="text" id="fn" name="First name" placeholder="EX Ahmed" class="c7"></td>
           </tr>
           <tr>
            <td><label for="ln">Last name:</label></td>
            <td><input type="text" id="ln" name="Last name" placeholder="EX Abdelhamid" class="c7"></td>
           </tr>
           <tr>
            <td><label for="Email" style="margin-left: 6px ;">Email:</label></td>
            <td><input type="email" id="Email" name="Email" placeholder="EX your name @gmail.com" class="c7"></td>
           </tr>
           <tr>
            <td><label for="Phone" style="margin-left: 6px">Phone:</label></td>
            <td><input type="number" id="Phone" name="Phone" placeholder="01033****32" class="c7"></td>
           </tr>
           <tr>
            <td><label for="bf" style="margin-left: 5px">book from:</label></td>
            <td><input type="date" id="bf" name="book from"  class="c8"></td>
            <td><input type="time" id="bf" name="book from" class="c8"></td>
          </tr>
           <tr style="margin-top: 20px ;">
            <td><label for="bt" style="margin-left:  7px">book to:</label></td>
            <td><input type="date" id="bt" name="book to"  class="c8"></td>
            <td><input type="time" id="bt" name="book to" class="c8"></td>
          </tr>
         
       
        </table>
        
       <input type="submit" class="submit">
     </fieldset>
          
     </form>

    </body>
</html
